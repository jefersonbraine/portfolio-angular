<div class="site-ambient-shell">
  <div class="site-ambient-grid"></div>
  <div class="site-ambient-orb site-ambient-orb-top"></div>
  <div class="site-ambient-orb site-ambient-orb-bottom"></div>

  <main class="site-ambient-content mx-auto flex min-h-dvh w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <section class="login-shell mx-auto flex min-h-[70vh] w-full max-w-6xl items-center justify-center py-6">
      <article class="login-card fade-up w-full max-w-md p-7 sm:p-8">
        <header class="mb-6 text-center">
          <div
            class="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-2xl border border-white/10 bg-white/5"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              class="h-6 w-6 text-white"
            >
              <rect x="3" y="11" width="18" height="10" rx="2"></rect>
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 0 1 8 0v4"></path>
            </svg>
          </div>
          <p class="mb-1 text-xs tracking-[0.22em] text-gray-500 uppercase">Área Privada</p>
          <h1 class="text-3xl font-bold text-white">Login Admin</h1>
          <p class="mt-2 text-sm text-gray-400">Acesse com sua conta Google autorizada.</p>
        </header>

        <div class="space-y-4">
          <button
            type="button"
            (click)="loginWithGoogle()"
            [disabled]="isSubmitting()"
            class="login-submit-btn google-btn w-full rounded-xl px-4 py-3 text-sm font-semibold"
          >
            <span class="google-btn-content">
              <svg viewBox="0 0 24 24" class="h-4 w-4" aria-hidden="true">
                <path
                  fill="#EA4335"
                  d="M12 10.2v3.9h5.5c-.2 1.2-.9 2.2-1.9 2.9l3.1 2.4c1.8-1.7 2.8-4.1 2.8-6.9 0-.7-.1-1.5-.2-2.2H12z"
                ></path>
                <path
                  fill="#34A853"
                  d="M12 22c2.6 0 4.8-.9 6.4-2.5l-3.1-2.4c-.9.6-2 .9-3.3.9-2.5 0-4.6-1.7-5.3-4H3.4v2.5C5 19.7 8.2 22 12 22z"
                ></path>
                <path
                  fill="#4A90E2"
                  d="M6.7 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.5H3.4A10 10 0 0 0 2 12c0 1.6.4 3.1 1.4 4.5L6.7 14z"
                ></path>
                <path
                  fill="#FBBC05"
                  d="M12 6c1.4 0 2.6.5 3.6 1.4l2.7-2.7C16.8 3.2 14.6 2 12 2 8.2 2 5 4.3 3.4 7.5L6.7 10c.7-2.3 2.8-4 5.3-4z"
                ></path>
              </svg>
              @if (isSubmitting()) {
                Entrando...
              } @else {
                Entrar com Google
              }
            </span>
          </button>

          <a
            routerLink="/"
            class="block text-center text-xs text-gray-500 transition-colors hover:text-gray-300"
          >
            Voltar ao site
          </a>

          @if (errorMessage()) {
            <p class="rounded-xl border border-red-500/20 bg-red-500/10 px-3 py-2 text-xs text-red-300">
              {{ errorMessage() }}
            </p>
          }
        </div>
      </article>
    </section>
  </main>
</div>
